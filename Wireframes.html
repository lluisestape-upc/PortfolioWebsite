<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Wireframes — Lluís Estapé</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Caveat', cursive; }

  /* Sketch style helpers */
  .sk { font-family: 'Caveat', cursive; }
  .mono { font-family: 'Share Tech Mono', monospace; }

  .wire-box {
    border: 2px solid #222;
    background: #f5f0e8;
    position: relative;
  }
  .wire-box-dark {
    border: 2px solid #333;
    background: #1c1c1c;
    position: relative;
  }
  .wire-label {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: #555;
    letter-spacing: 0.02em;
  }
  .wire-label-white {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: #888;
  }
  .accent { color: #e8a000; }
  .accent2 { color: #4ecdc4; }
  .dimline { border: none; border-top: 1px dashed #ccc; }
  .dimline-dark { border: none; border-top: 1px dashed #333; }

  /* hatched placeholder */
  .hatch {
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 5px,
      rgba(0,0,0,0.07) 5px,
      rgba(0,0,0,0.07) 6px
    );
  }
  .hatch-dark {
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 5px,
      rgba(255,255,255,0.04) 5px,
      rgba(255,255,255,0.04) 6px

    font-family: 'Caveat', cursive;

    color: #e8a000;
    position: absolute;

<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ─── SHARED MINI COMPONENTS ─── */

function SkBtn({ children, accent, dark }) {
  return (
    <div style={{
      display: 'inline-block',
      border: `2px solid ${accent ? '#e8a000' : dark ? '#555' : '#333'}`,
      borderRadius: 3,
      padding: '3px 10px',
      fontFamily: 'Caveat, cursive',
      fontSize: 13,
      color: accent ? '#e8a000' : dark ? '#aaa' : '#222',
      background: accent ? 'rgba(232,160,0,0.1)' : 'transparent',
    }}>{children}</div>
  );
}

function Pill({ children, accent }) {
  return (
    <span style={{
      display: 'inline-block',
      border: `1.5px solid ${accent ? '#e8a000' : '#333'}`,
      borderRadius: 20,
      padding: '1px 8px',
      fontFamily: 'Caveat, cursive',
      fontSize: 12,
      color: accent ? '#e8a000' : '#444',
      marginRight: 4,
    }}>{children}</span>
  );
}

function HatchBox({ width, height, dark, label, style = {} }) {
  return (
    <div style={{
      width, height,
      border: `1.5px dashed ${dark ? '#444' : '#bbb'}`,
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      fontFamily: 'Caveat, cursive',
      fontSize: 12,
      color: dark ? '#555' : '#aaa',
      background: dark
        ? 'repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(255,255,255,0.03) 5px,rgba(255,255,255,0.03) 6px)'
        : 'repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,0.05) 5px,rgba(0,0,0,0.05) 6px)',
      flexShrink: 0,
      ...style,
    }}>{label || ''}</div>
  );
}

/* ─── VARIATION A: IDE / FILE TREE ─── */

  return (
    <div style={{ width: 1100, height: 640, background: '#141414', border: '2px solid #2a2a2a', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Title bar */}
      <div style={{ height: 36, background: '#1e1e1e', borderBottom: '1px solid #2a2a2a', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 8, flexShrink: 0 }}>
        <div style={{ width: 10, height: 10, borderRadius: '50%', border: '1.5px solid #555' }} />
        <div style={{ width: 10, height: 10, borderRadius: '50%', border: '1.5px solid #555' }} />
        <div style={{ width: 10, height: 10, borderRadius: '50%', border: '1.5px solid #555' }} />
        <div style={{ flex: 1, textAlign: 'center', fontFamily: 'Caveat', fontSize: 13, color: '#555' }}>lluisestape.dev — portfolio.exe</div>
        <BurgerMenu dark />
      </div>
      {/* Tab bar */}
      <div style={{ height: 30, background: '#1a1a1a', borderBottom: '1px solid #2a2a2a', display: 'flex', alignItems: 'center', padding: '0 8px', gap: 2, flexShrink: 0 }}>

      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

        {/* Main editor */}
        <div style={{ flex: 1, padding: '20px 28px', overflowY: 'auto', background: '#141414' }}>

/* ─── VARIATION B: DAW MIXER ─── */

function WaveformBar({ h, dark }) {
  const bars = 32;
  return (
    <svg width="100%" height={h} style={{ display: 'block' }}>
      {[...Array(bars)].map((_, i) => {
        const bh = (Math.sin(i * 0.9) * 0.4 + Math.sin(i * 0.3) * 0.3 + 0.5) * h * 0.7 + h * 0.1;
        return (
          <rect key={i} x={`${(i/bars)*100}%`} y={(h - bh)/2} width={`${80/bars}%`} height={bh}
            fill={dark ? 'rgba(232,160,0,0.25)' : 'rgba(0,0,0,0.15)'} rx={1} />
        );
      })}
    </svg>
  );
}

function ChannelStrip({ name, tags, active }) {
  return (
    <div style={{
      width: 130, flexShrink: 0,
      border: `1.5px solid ${active ? '#e8a000' : '#2a2a2a'}`,
      background: '#161616',
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
    }}>
      {/* Channel header */}
      <div style={{ background: active ? 'rgba(232,160,0,0.12)' : '#1c1c1c', padding: '6px 8px', borderBottom: `1px solid ${active ? '#e8a000' : '#2a2a2a'}` }}>
        <div style={{ fontFamily: 'Caveat', fontSize: 14, color: active ? '#e8a000' : '#888', marginBottom: 2 }}>{name}</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 2 }}>
          {tags.map(t => <span key={t} style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 9, color: '#444', border: '1px solid #2a2a2a', padding: '0 3px', borderRadius: 2 }}>{t}</span>)}
        </div>
      </div>
      {/* Waveform display */}
      <div style={{ height: 50, background: '#111', borderBottom: '1px solid #222' }}>
        <WaveformBar h={50} dark />
      </div>
      {/* Fader area */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', padding: 8, gap: 6 }}>
        {/* Knob placeholder */}
        <div style={{ width: 28, height: 28, borderRadius: '50%', border: `1.5px solid ${active ? '#e8a000' : '#333'}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ width: 3, height: 8, background: active ? '#e8a000' : '#444', borderRadius: 2, transform: 'translateY(-2px)' }} />
        </div>
        {/* Level meter */}
        <div style={{ width: 12, height: 60, background: '#0a0a0a', border: '1px solid #222', borderRadius: 2, overflow: 'hidden', position: 'relative' }}>
          <div style={{ position: 'absolute', bottom: 0, width: '100%', height: `${active ? 70 : 40}%`, background: active ? 'linear-gradient(to top, #4ecdc4, #e8a000)' : 'linear-gradient(to top, #2a4a3a, #1a3a2a)' }} />
        </div>
        <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 9, color: '#444' }}>-6dB</div>
      </div>
      {/* Solo/mute */}
      <div style={{ display: 'flex', borderTop: '1px solid #222' }}>
        <div style={{ flex: 1, textAlign: 'center', fontFamily: 'Caveat', fontSize: 11, color: '#555', padding: '3px 0', borderRight: '1px solid #222' }}>S</div>
        <div style={{ flex: 1, textAlign: 'center', fontFamily: 'Caveat', fontSize: 11, color: '#555', padding: '3px 0' }}>M</div>
      </div>
    </div>
  );
}

/* ─── VARIATION C: TERMINAL / CLI ─── */

function TermLine({ prompt, cmd, color }) {

      {prompt && <span style={{ color: '#4ecdc4' }}>{prompt}</span>}

}

            <div style={{ fontFamily: 'Caveat', fontSize: 28, fontWeight: 700, color: '#fff', lineHeight: 1 }}>Lluís Estapé</div>

            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: '#444', marginTop: 6 }}>C++ · JUCE · MATLAB · Python · Quantum ML</div>
          </div>

          <TermLine prompt="lluisestape@portfolio:~$" cmd=" ls projects/" />
          <div style={{ height: 8 }} />
          {projects.map((p, i) => (
            <ProjectCard key={i} {...p} i={i+1} />
          ))}

          {/* Cursor */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8 }}>
            <span style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 12, color: '#4ecdc4' }}>lluisestape@portfolio:~$</span>
            <div style={{ width: 8, height: 14, background: '#e8a000', animation: 'none' }} />
          </div>
        </div>

        {/* Right panel — skills + contact */}
        <div style={{ width: 280, padding: '20px 20px', flexShrink: 0, overflowY: 'auto' }}>
          <TermLine prompt="$" cmd=" cat skills.json" />
          <div style={{ marginTop: 8, marginBottom: 16 }}>
            {[
              { cat: 'Audio DSP', items: ['C++', 'JUCE', 'MATLAB', 'IIR/FIR', 'VST3', 'FFT'] },
              { cat: 'ML / AI', items: ['Python', 'PyTorch', 'GNN', 'FinBERT', 'Quantum'] },
              { cat: 'Tools', items: ['Git', 'Visual Studio', 'Projucer'] },
            ].map(({ cat, items }) => (
              <div key={cat} style={{ marginBottom: 12 }}>
                <div style={{ fontFamily: 'Caveat', fontSize: 13, color: '#e8a000', marginBottom: 4 }}>{cat}</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                  {items.map(it => (
                    <span key={it} style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 9, color: '#666', border: '1px solid #222', padding: '2px 6px', borderRadius: 2 }}>{it}</span>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <hr style={{ border: 'none', borderTop: '1px dashed #1e1e1e', margin: '12px 0' }} />

          <TermLine prompt="$" cmd=" cat contact.txt" />
          <div style={{ marginTop: 8 }}>
            {[
              { icon: '✉', val: 'lluis.estape@estudiantat.upc.edu' },
              { icon: '⌥', val: 'github.com/lluisestape-upc' },
              { icon: '◈', val: 'linkedin.com/in/lluís-estapé' },
            ].map(({ icon, val }) => (
              <div key={val} style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 10, color: '#555', marginBottom: 6, display: 'flex', gap: 8 }}>
                <span style={{ color: '#4ecdc4' }}>{icon}</span>
                <span>{val}</span>
              </div>
            ))}
          </div>

          <hr style={{ border: 'none', borderTop: '1px dashed #1e1e1e', margin: '12px 0' }} />

          <TermLine prompt="$" cmd=" open resume.pdf" />
          <div style={{ marginTop: 8 }}>
            <div style={{ border: '1.5px solid #e8a000', padding: '6px 12px', fontFamily: 'Caveat', fontSize: 14, color: '#e8a000', display: 'inline-block', cursor: 'pointer' }}>↓ Download Resume</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── BURGER MENU ─── */

function BurgerMenu({ dark }) {
  const [open, setOpen] = React.useState(false);
  const navItems = ['about', 'projects', 'skills', 'contact', 'resume.pdf'];
  const bg = dark ? '#111' : '#1a1a1a';
  const border = dark ? '#2a2a2a' : '#222';

  return (
    <div style={{ position: 'relative', zIndex: 100 }}>
      {/* Burger icon */}
      <div onClick={() => setOpen(o => !o)} style={{ width: 32, height: 32, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 5, cursor: 'pointer', border: `1.5px solid ${open ? '#e8a000' : border}`, borderRadius: 3, background: open ? 'rgba(232,160,0,0.08)' : 'transparent', padding: 6 }}>
        <div style={{ width: '100%', height: 2, background: open ? '#e8a000' : '#666', transition: 'all 0.2s', transform: open ? 'rotate(45deg) translate(2px, 4px)' : 'none', borderRadius: 1 }} />
        <div style={{ width: '100%', height: 2, background: open ? 'transparent' : '#666', transition: 'all 0.2s', borderRadius: 1 }} />
        <div style={{ width: '100%', height: 2, background: open ? '#e8a000' : '#666', transition: 'all 0.2s', transform: open ? 'rotate(-45deg) translate(2px, -4px)' : 'none', borderRadius: 1 }} />
      </div>

      {/* Drawer */}
      {open && (
        <div style={{ position: 'absolute', top: 38, right: 0, width: 200, background: bg, border: `1.5px solid #e8a000`, zIndex: 999 }}>
          <div style={{ fontFamily: 'Caveat', fontSize: 11, color: '#444', padding: '8px 14px 4px', letterSpacing: 1 }}>NAVIGATION</div>
          {navItems.map((n, i) => (
            <div key={n} onClick={() => setOpen(false)} style={{ padding: '8px 14px', fontFamily: n === 'resume.pdf' ? 'Share Tech Mono, monospace' : 'Caveat', fontSize: n === 'resume.pdf' ? 11 : 15, color: i === 1 ? '#e8a000' : '#888', borderTop: `1px solid ${border}`, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ color: '#333', fontFamily: 'Share Tech Mono, monospace', fontSize: 10 }}>{String(i+1).padStart(2,'0')}</span>
              {n}
              {n === 'resume.pdf' && <span style={{ marginLeft: 'auto', color: '#e8a000', fontSize: 12 }}>↓</span>}
            </div>
          ))}
          <div style={{ padding: '8px 14px', borderTop: `1px solid ${border}` }}>
            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 9, color: '#333' }}>lluisestape-upc · github</div>
            <div style={{ fontFamily: 'Share Tech Mono, monospace', fontSize: 9, color: '#333' }}>lluís-estapé · linkedin</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── CANVAS WRAPPER ─── */

function App() {
  return (
    <DesignCanvas>
      <DCSection id="wires" title="Portfolio Wireframes — 3 Directions">
        <DCArtboard id="a" label="A — IDE / File Explorer" width={1100} height={640}>
          <VariationA />
        </DCArtboard>
        <DCArtboard id="b" label="B — DAW Mixer / Channel Strips" width={1100} height={640}>
          <VariationB />
        </DCArtboard>
        <DCArtboard id="c" label="C — Terminal / CLI" width={1100} height={640}>
          <VariationC />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
