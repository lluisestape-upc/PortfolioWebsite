/* ── WAVEFORM CANVAS ── */
function WaveCanvas({ width = 300, height = 48, color = 'var(--amber)', animate = true }) {
  const ref = useRef();
  const raf = useRef();
  const t = useRef(0);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      const pts = 120;
      for (let i = 0; i <= pts; i++) {
        const x = (i / pts) * canvas.width;
        const phase = (i / pts) * Math.PI * 6 + t.current;
        const y = canvas.height / 2 + Math.sin(phase) * 14 + Math.sin(phase * 2.1 + 1) * 5 + Math.sin(phase * 0.4) * 8;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      if (animate) { t.current += 0.03; raf.current = requestAnimationFrame(draw); }
    };
    draw();
    return () => cancelAnimationFrame(raf.current);
  }, [color, animate]);
  return <canvas ref={ref} width={width} height={height} style={{ display: 'block', width: '100%', height }} />;
}

      <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--amber)', marginBottom: 24, letterSpacing: 1 }}>// resume.pdf</div>
      <div style={{ fontFamily: 'var(--sans)', fontSize: 22, fontWeight: 600, color: '#fff', marginBottom: 8 }}>Curriculum Vitae</div>
      <div style={{ fontFamily: 'var(--sans)', fontSize: 14, color: 'var(--muted)', marginBottom: 32, lineHeight: 1.6 }}>
        Lluís Estapé — Telecommunications Engineering, UPC TelecomBCN<br/>
        Audio DSP · ML · C++ · JUCE · MATLAB · Python
      </div>
      <div style={{ border: '1px solid var(--border)', borderRadius: 6, padding: '20px 24px', background: 'var(--border-light)', marginBottom: 24 }}>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--muted)', marginBottom: 12 }}>// recent experience</div>
        {[
          { role: 'Cybersecurity Strategy Consultant', org: 'Deloitte', period: 'Feb 2026 – present' },
          { role: 'Production Assistant', org: 'Arcadia Motion Pictures', period: 'Jun – Aug 2025' },
          { role: 'Production Assistant', org: 'Mundo Cero', period: 'Jul – Sep 2024' },
          { role: 'MWC Exhibition Staff', org: 'NTT Docomo', period: '2025' },
        ].map(({ role, org, period }) => (
          <div key={role} style={{ marginBottom: 14, paddingBottom: 14, borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>{role}</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 2 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--amber)' }}>{org}</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--muted)' }}>{period}</span>
            </div>
          </div>
        ))}
      </div>
      <a href="uploads/CV_2026.pdf" download style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '10px 20px', border: '1px solid var(--amber)', borderRadius: 4, fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--amber)', background: 'var(--amber-dim)', cursor: 'pointer' }}>
        ↓ Download CV (PDF)
      </a>
    </div>
  );
}

/* ── SIDEBAR ── */
function Sidebar({ active, onSelect }) {
  const [projectsOpen, setProjectsOpen] = useState(true);
  return (
    <div style={{ width: 220, flexShrink: 0, background: 'var(--sidebar)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Explorer header */}
      <div style={{ padding: '10px 14px 6px', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--muted)', letterSpacing: 1, borderBottom: '1px solid var(--border-light)', flexShrink: 0 }}>EXPLORER</div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 0' }}>
        {/* Top-level files */}
        {[
          { id: 'readme', label: 'README.md', icon: '📄', col: '#e8a000' },
          { id: 'skills', label: 'skills.json', icon: '{}', col: 'var(--green)', mono: true },
          { id: 'contact', label: 'contact.txt', icon: '✉', col: 'var(--teal)' },
          { id: 'resume', label: 'resume.pdf', icon: '↓', col: 'var(--red)' },
        ].map(({ id, label, icon, col, mono }) => (
          <FileRow key={id} label={label} icon={icon} col={col} mono={mono} active={active === id} onClick={() => onSelect(id)} depth={0} />
        ))}

        {/* Projects folder */}
        <div onClick={() => setProjectsOpen(o => !o)} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 14px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--muted)' }}
          onMouseEnter={e => e.currentTarget.style.background = 'var(--border-light)'}
          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
          <span style={{ fontSize: 10, transition: 'transform 0.15s', display: 'inline-block', transform: projectsOpen ? 'rotate(90deg)' : 'none' }}>▶</span>
          <span>projects/</span>
          <span style={{ marginLeft: 'auto', fontSize: 10, background: 'var(--border)', padding: '1px 5px', borderRadius: 8, color: 'var(--muted)' }}>{PROJECTS.length}</span>
        </div>
        {projectsOpen && PROJECTS.map(p => (
          <FileRow key={p.id} label={p.file} icon="." col={p.langColor} active={active === `proj:${p.id}`} onClick={() => onSelect(`proj:${p.id}`)} depth={1} />
        ))}
      </div>
      {/* Git branch */}
      <div style={{ padding: '8px 14px', borderTop: '1px solid var(--border)', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--muted)', flexShrink: 0 }}>
        ⎇&nbsp; main &nbsp;·&nbsp; <span style={{ color: 'var(--green)' }}>✓ up to date</span>
      </div>
    </div>
  );
}

function FileRow({ label, icon, col, mono, active, onClick, depth }) {
  return (
    <div onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: `3px 14px 3px ${14 + depth * 16}px`, cursor: 'pointer', background: active ? 'rgba(232,160,0,0.08)' : 'transparent', borderLeft: active ? '2px solid var(--amber)' : '2px solid transparent', transition: 'background 0.1s' }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'var(--border-light)'; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
      <span style={{ color: col, fontFamily: mono ? 'var(--mono)' : 'inherit', fontSize: mono ? 11 : 13, flexShrink: 0, width: 14, textAlign: 'center' }}>{icon}</span>
      <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: active ? '#fff' : 'var(--muted)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</span>
    </div>
  );
}

/* ── TAB BAR ── */
function TabBar({ tabs, active, onSelect, onClose }) {
  return (
    <div style={{ display: 'flex', borderBottom: '1px solid var(--border)', background: 'var(--header)', overflowX: 'auto', flexShrink: 0 }}>
      {tabs.map(t => {
        const isActive = t.id === active;
        return (
          <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 16px', borderRight: '1px solid var(--border)', background: isActive ? 'var(--bg)' : 'transparent', borderBottom: isActive ? '1px solid var(--bg)' : 'none', marginBottom: isActive ? -1 : 0, cursor: 'pointer', flexShrink: 0 }}
            onClick={() => onSelect(t.id)}>
            <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: isActive ? '#fff' : 'var(--muted)', whiteSpace: 'nowrap' }}>{t.label}</span>
            <span onClick={e => { e.stopPropagation(); onClose(t.id); }} style={{ color: 'var(--muted)', fontSize: 12, lineHeight: 1, padding: '0 2px', borderRadius: 3 }}
              onMouseEnter={e => e.currentTarget.style.color = '#fff'}
              onMouseLeave={e => e.currentTarget.style.color = 'var(--muted)'}>×</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── BURGER MENU ── */
function BurgerMenu({ onNav }) {
  const [open, setOpen] = useState(false);
  const navItems = [
    { id: 'readme', label: 'README.md' },
    { id: 'projects', label: 'projects/' },
    { id: 'skills', label: 'skills.json' },
    { id: 'contact', label: 'contact.txt' },
    { id: 'resume', label: 'resume.pdf' },
  ];
  return (
    <div style={{ position: 'relative' }}>
      <div onClick={() => setOpen(o => !o)} style={{ width: 32, height: 32, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 5, cursor: 'pointer', padding: 6 }}>
        <div style={{ width: '100%', height: 1.5, background: open ? 'var(--amber)' : 'var(--muted)', transition: 'all 0.2s', transform: open ? 'rotate(45deg) translate(0, 4px)' : 'none' }} />
        <div style={{ width: '100%', height: 1.5, background: open ? 'transparent' : 'var(--muted)', transition: 'all 0.2s' }} />
        <div style={{ width: '100%', height: 1.5, background: open ? 'var(--amber)' : 'var(--muted)', transition: 'all 0.2s', transform: open ? 'rotate(-45deg) translate(0, -4px)' : 'none' }} />
      </div>
      {open && (
        <div style={{ position: 'absolute', top: 38, right: 0, width: 200, background: 'var(--sidebar)', border: '1px solid var(--amber)', zIndex: 999, borderRadius: 4, overflow: 'hidden' }}>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--muted)', padding: '8px 14px 4px', letterSpacing: 1 }}>NAVIGATE</div>
          {navItems.map((n, i) => (
            <div key={n.id} onClick={() => { onNav(n.id); setOpen(false); }} style={{ padding: '8px 14px', fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--muted)', borderTop: '1px solid var(--border)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}
              onMouseEnter={e => { e.currentTarget.style.background = 'var(--amber-dim)'; e.currentTarget.style.color = 'var(--amber)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--muted)'; }}>
              <span style={{ color: 'var(--border)', fontSize: 10 }}>{String(i+1).padStart(2,'0')}</span>
              {n.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── MINIMAP ── */
function Minimap() {
  return (
    <div style={{ width: 52, background: '#0a0d12', borderLeft: '1px solid var(--border)', flexShrink: 0, padding: '8px 6px', overflowY: 'hidden' }}>
      {[...Array(28)].map((_, i) => (
        <div key={i} style={{ height: 3, marginBottom: 2, borderRadius: 1, background: i % 5 === 0 ? '#21262d' : '#161b22', width: i % 3 === 0 ? '90%' : i % 2 === 0 ? '60%' : '75%' }} />
      ))}
    </div>
  );
}

/* ── APP ── */
const FILE_LABELS = {
  readme: 'README.md',
  projects: 'projects/',
  skills: 'skills.json',
  contact: 'contact.txt',
  resume: 'resume.pdf',
  ...Object.fromEntries(PROJECTS.map(p => [`proj:${p.id}`, p.file])),
};

function App() {
  const [tabs, setTabs] = useState([{ id: 'readme', label: 'README.md' }]);
  const [active, setActive] = useState('readme');

  const openTab = useCallback((id) => {
    const label = FILE_LABELS[id] || id;
    // If it's "projects" shortcut, open the list view
    const tabId = id === 'projects' ? 'projects' : id;
    setTabs(prev => prev.find(t => t.id === tabId) ? prev : [...prev, { id: tabId, label }]);
    setActive(tabId);
  }, []);

  const closeTab = useCallback((id) => {
    setTabs(prev => {
      const next = prev.filter(t => t.id !== id);
      if (active === id && next.length > 0) setActive(next[next.length - 1].id);
      return next;
    });
  }, [active]);

  const renderView = () => {
    if (active === 'readme') return <ReadmeView />;
    if (active === 'projects') return <ProjectListView onOpen={id => openTab(`proj:${id}`)} />;
    if (active === 'skills') return <SkillsView />;
    if (active === 'contact') return <ContactView />;
    if (active === 'resume') return <ResumeView />;
    if (active.startsWith('proj:')) return <ProjectView id={active.replace('proj:', '')} />;
    return null;
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Title bar */}
      <div style={{ height: 38, background: 'var(--header)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 10, flexShrink: 0 }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {['#ff6b6b','#e8a000','#56d364'].map((c, i) => (
            <div key={i} style={{ width: 11, height: 11, borderRadius: '50%', background: c, opacity: 0.8 }} />
          ))}
        </div>
        <div style={{ flex: 1, textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--muted)' }}>
          lluisestape — <span style={{ color: 'var(--amber)' }}>{FILE_LABELS[active] || active}</span>
        </div>
        <BurgerMenu onNav={openTab} />
      </div>

      {/* Tab bar */}
      {tabs.length > 0 && (
        <TabBar tabs={tabs} active={active} onSelect={setActive} onClose={closeTab} />
      )}

      {/* Body */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <Sidebar active={active} onSelect={openTab} />
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {renderView()}
        </div>
        <Minimap />
      </div>

      {/* Status bar */}
      <div style={{ height: 22, background: 'var(--amber)', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 20, flexShrink: 0 }}>
        <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: '#0d1117', fontWeight: 600 }}>⎇ main</span>
        <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: '#0d1117' }}>Lluís Estapé · UPC TelecomBCN · Barcelona</span>
        <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 10, color: '#0d1117' }}>C++ · MATLAB · Python · JUCE</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
